server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: qiyam-ajk-masjid

logging:
  level:
    root: INFO
    com.qiyam: DEBUG
    org.springframework.security: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
    filter: true

app:
  jwt:
    secret: ${APP_JWT_SECRET:ajkmasjid-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}
    issuer: qiyam-ajk
  security:
    permitted-paths:
      - /auth/**
      - /mosques/**
      - /finance/**
      - /committees/**
      - /announcements/**
      - /activities/**
      - /donations/**
      - /meetings/**
      - /documents/**
      - /users/**
      - /swagger-ui/**
      - /api-docs/**
      - /swagger-resources/**
      - /actuator/health
  supabase:
    url: ${SUPABASE_URL:https://qiyamdb.hashtech.app}
    anon-key: ${SUPABASE_ANON_KEY:eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpc3MiOiJzdXBhYmFzZSIsImlhdCI6MTc2NzcwNzI4MCwiZXhwIjo0OTIzMzgwODgwLCJyb2xlIjoiYW5vbiJ9.k2PC_q75f0uuxDk_q8wuxxT3PxtjQYktgpfdHEUgylE}
    service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpc3MiOiJzdXBhYmFzZSIsImlhdCI6MTc2NzcwNzI4MCwiZXhwIjo0OTIzMzgwODgwLCJyb2xlIjoic2VydmljZV9yb2xlIn0.szPMIZmG6r9AHBDxcBSONGc0nWk-WxWAvKuqS7TFcqM}
  storage:
    r2-account-id: ${R2_ACCOUNT_ID:}
    r2-access-key-id: ${R2_ACCESS_KEY_ID:}
    r2-secret-access-key: ${R2_SECRET_ACCESS_KEY:}
    r2-bucket-name: ${R2_BUCKET_NAME:qiyam-storage}
    r2-base-url: ${R2_BASE_URL:https://assets.catchupmobility.com}
  google:
    places-api-key: ${GOOGLE_PLACES_API_KEY:}
