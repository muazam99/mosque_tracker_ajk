server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: qiyam-ajk-masjid

logging:
  level:
    root: INFO
    com.qiyam: DEBUG
    org.springframework.security: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
    filter: true

app:
  jwt:
    secret: ${APP_JWT_SECRET}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}
    issuer: qiyam-ajk
  security:
    swagger-enabled: false
    permitted-paths:
      - /auth/**
      - /actuator/health
      - /actuator/health/**
  cors:
    allowed-origins:
      - https://ajk.qiyam.com.my
  supabase:
    url: ${SUPABASE_URL}
    anon-key: ${SUPABASE_ANON_KEY}
    service-role-key: ${SUPABASE_SERVICE_ROLE_KEY}
  storage:
    r2-account-id: ${R2_ACCOUNT_ID:}
    r2-access-key-id: ${R2_ACCESS_KEY_ID:}
    r2-secret-access-key: ${R2_SECRET_ACCESS_KEY:}
    r2-bucket-name: ${R2_BUCKET_NAME:qiyam-storage}
    r2-base-url: ${R2_BASE_URL:}
  google:
    places-api-key: ${GOOGLE_PLACES_API_KEY:}
    web-client-id: ${GOOGLE_WEB_CLIENT_ID:}
